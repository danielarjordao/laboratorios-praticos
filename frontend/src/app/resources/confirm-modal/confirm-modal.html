@if (options) {
  <div class="modal-overlay" (click)="onCancel()">
    <div class="modal-content modal-small" (click)="$event.stopPropagation()">

      <header class="modal-header">
        <h3 style="margin: 0;">{{ options.title }}</h3>
        <button class="btn-close-modal" (click)="onCancel()" aria-label="Close">
          <span class="material-symbols-outlined">close</span>
        </button>
      </header>

      <div class="modal-body" style="padding: 16px 0;">
        <p style="margin: 0; color: var(--muted-foreground); line-height: 1.5;">
          {{ options.message }}
        </p>
      </div>

      <footer class="modal-footer" style="display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid var(--border); padding-top: 16px;">
        <button type="button" class="btn-outline" (click)="onCancel()">
          {{ options.cancelText || 'Cancel' }}
        </button>

        <button
          type="button"
          class="btn-primary"
          [class.btn-destructive]="options.isDestructive"
          (click)="onConfirm()">
          {{ options.confirmText || 'Confirm' }}
        </button>
      </footer>

    </div>
  </div>
}
