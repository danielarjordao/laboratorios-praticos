<aside class="sidebar">
  <nav class="menu" aria-label="Primary Navigation">
    <div class="menu-section">
      <span class="section-title label">General</span>
      <a routerLink="/dashboard" class="menu-item" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <span class="material-symbols-outlined icon">space_dashboard</span>
        <span class="label">Dashboard</span>
      </a>
      <a routerLink="/transactions" class="menu-item" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }">
        <span class="material-symbols-outlined icon">receipt_long</span>
        <span class="label">Transactions</span>
      </a>
      <a routerLink="/accounts" class="menu-item" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <span class="material-symbols-outlined icon">account_balance</span>
        <span class="label">Accounts</span>
      </a>
      <a routerLink="/categories" class="menu-item" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <span class="material-symbols-outlined icon">category</span>
        <span class="label">Categories</span>
      </a>
    </div>

    <div class="menu-section">
      <span class="section-title label">Planning</span>
      <a routerLink="/past-12-months" class="menu-item" [class.disabled]="isNavDisabled('/past-12-months')" [attr.aria-disabled]="isNavDisabled('/past-12-months')" [attr.tabindex]="isNavDisabled('/past-12-months') ? -1 : null" (click)="onNavClick($event, '/past-12-months')">
        <span class="material-symbols-outlined icon">calendar_month</span>
        <span class="label">Past 12 Months</span>
      </a>
      <small class="lock-note label">Temporarily locked</small>
      <a routerLink="/forecast" class="menu-item" [class.disabled]="isNavDisabled('/forecast')" [attr.aria-disabled]="isNavDisabled('/forecast')" [attr.tabindex]="isNavDisabled('/forecast') ? -1 : null" (click)="onNavClick($event, '/forecast')">
        <span class="material-symbols-outlined icon">trending_up</span>
        <span class="label">Forecast</span>
      </a>
      <small class="lock-note label">Temporarily locked</small>
      <a routerLink="/goals" class="menu-item" [class.disabled]="isNavDisabled('/goals')" [attr.aria-disabled]="isNavDisabled('/goals')" [attr.tabindex]="isNavDisabled('/goals') ? -1 : null" (click)="onNavClick($event, '/goals')">
        <span class="material-symbols-outlined icon">track_changes</span>
        <span class="label">Goals</span>
      </a>
      <small class="lock-note label">Temporarily locked</small>
      <a routerLink="/budgets" class="menu-item" [class.disabled]="isNavDisabled('/budgets')" [attr.aria-disabled]="isNavDisabled('/budgets')" [attr.tabindex]="isNavDisabled('/budgets') ? -1 : null" (click)="onNavClick($event, '/budgets')">
        <span class="material-symbols-outlined icon">pie_chart</span>
        <span class="label">Budgets</span>
      </a>
      <small class="lock-note label">Temporarily locked</small>
    </div>
  </nav>
</aside>
