<div class="page-container">
  <div class="profile-card">
    <h2>My Profile</h2>
    <p class="subtitle">Update your personal details and password.</p>

    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="form-layout">

      <div class="name-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" formControlName="firstName">
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" formControlName="lastName">
        </div>
      </div>

      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" formControlName="password" placeholder="New password">
      </div>

      @if (successMessage) {
        <div class="success-message">
          <span class="material-symbols-outlined">check_circle</span>
          {{ successMessage }}
        </div>
      }

      @if (errorMessage) {
        <div class="error-message">
          <span class="material-symbols-outlined">error</span>
          {{ errorMessage }}
        </div>
      }

      <div class="form-actions">
        <button type="submit" class="btn-primary" [disabled]="profileForm.invalid || isLoading">
          <span class="material-symbols-outlined">save</span>
          {{ isLoading ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>

    </form>
  </div>
</div>
