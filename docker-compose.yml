version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      # Sincroniza o código local com o contentor (Hot-reload)
      - ./backend:/usr/src/app
      # Ignora a pasta node_modules local para não dar conflito de dependências entre o host e o contentor
      - /usr/src/app/node_modules
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
